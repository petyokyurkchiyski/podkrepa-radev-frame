<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прогресивна България — профилна рамка</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🟢</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Montserrat, 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0a2e1f 0%, #1b5e3b 40%, #7cb342 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #fff;
            border-radius: 20px;
            padding: 36px;
            max-width: 820px;
            width: 100%;
            box-shadow: 0 24px 64px rgba(0,0,0,.25);
        }
        h1 { color: #1b5e3b; font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 8px; }
        .sub { text-align: center; color: #2a7a52; font-weight: 600; font-size: 15px; margin-bottom: 24px; }
        .file-label {
            display: block;
            padding: 18px;
            background: linear-gradient(135deg, #1b5e3b, #2a7a52);
            color: #fff;
            text-align: center;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid #0f3d2e;
        }
        .file-label:hover { filter: brightness(1.06); }
        #photoInput { position: absolute; opacity: 0; width: 0; height: 0; }
        .preview-wrap { margin: 28px 0; text-align: center; }
        .canvas-box {
            display: inline-block;
            border: 3px solid #1b5e3b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 28px rgba(27,94,59,.35);
        }
        /* Шахматна подложка = прозрачност; не е „сив фон“ върху снимката */
        #previewCanvas {
            display: block; max-width: 100%; height: auto;
            background-color: #c8c8c8;
            background-image:
                linear-gradient(45deg, #b0b0b0 25%, transparent 25%),
                linear-gradient(-45deg, #b0b0b0 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #b0b0b0 75%),
                linear-gradient(-45deg, transparent 75%, #b0b0b0 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0;
        }
        .btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-dl { background: #1b5e3b; color: #fff; }
        .btn-dl:disabled { opacity: .45; cursor: not-allowed; }
        .btn-rst { background: #e0e0e0; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Прогресивна България</h1>
        <p class="sub">Генератор на профилна рамка — нова визия 2026</p>
        <label class="file-label">
            Изберете снимка
            <input type="file" id="photoInput" accept="image/*">
        </label>
        <div class="preview-wrap">
            <div class="canvas-box">
                <canvas id="previewCanvas" width="800" height="800"></canvas>
            </div>
        </div>
        <div class="btns">
            <button class="btn btn-dl" id="downloadBtn" disabled>⬇ Изтегли снимката</button>
            <button class="btn btn-rst" id="resetBtn" disabled>🔄 Нова снимка</button>
        </div>
    </div>

    <script>
    // Frame = original image as overlay (one-to-one). Overlay: assets/frame_overlay.png from build_frame_overlay.py
    const CANVAS_SIZE = 800;
    const FRAME_OVERLAY_URL = '/assets/frame_overlay.png?v=10';
    /** Вътрешен кръг за снимка (бяла зона в макета), мащаб от 720px */
    const CENTER = 400;
    const PHOTO_R = 374;
    /** Външен кръг на макета — отрязва бяла лента/ъгли извън кръга */
    const FRAME_CLIP_R = 400;

    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d', { alpha: true });
    const photoInput = document.getElementById('photoInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');

    let userImage = null;
    let frameOverlay = null;

    const overlayImg = new Image();
    overlayImg.onload = function () { frameOverlay = overlayImg; render(); };
    overlayImg.onerror = function () { frameOverlay = null; render(); };
    overlayImg.src = FRAME_OVERLAY_URL;

    function render() {
        const s = CANVAS_SIZE;
        ctx.clearRect(0, 0, s, s);
        ctx.save();
        ctx.beginPath();
        ctx.arc(CENTER, CENTER, FRAME_CLIP_R, 0, Math.PI * 2);
        ctx.clip();

        if (userImage && userImage.complete) {
            ctx.save();
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.beginPath();
            ctx.arc(CENTER, CENTER, PHOTO_R, 0, Math.PI * 2);
            ctx.clip();
            const iw = userImage.naturalWidth;
            const ih = userImage.naturalHeight;
            const cover = Math.max((PHOTO_R * 2) / iw, (PHOTO_R * 2) / ih);
            const w = iw * cover;
            const h = ih * cover;
            ctx.drawImage(userImage, CENTER - w / 2, CENTER - h / 2, w, h);
            ctx.restore();
        } else {
            ctx.save();
            ctx.beginPath();
            ctx.arc(CENTER, CENTER, PHOTO_R, 0, Math.PI * 2);
            ctx.clip();
            ctx.fillStyle = '#365e46';
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.font = '600 22px Montserrat, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Качете снимка', CENTER, CENTER - 12);
            ctx.font = '400 15px Montserrat, sans-serif';
            ctx.fillText('или ползвайте прегледа по-долу', CENTER, CENTER + 18);
            ctx.restore();
        }

        if (frameOverlay && frameOverlay.complete && frameOverlay.naturalWidth > 0) {
            ctx.save();
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(frameOverlay, 0, 0, s, s);
            ctx.restore();
        }

        ctx.restore();

        downloadBtn.disabled = !userImage;
        resetBtn.disabled = !userImage;
    }

    photoInput.addEventListener('change', function () {
        const f = this.files && this.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = () => {
            const img = new Image();
            img.onload = () => { userImage = img; render(); };
            img.src = r.result;
        };
        r.readAsDataURL(f);
    });

    downloadBtn.addEventListener('click', () => {
        const a = document.createElement('a');
        a.download = 'progressive-bulgaria-profil.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
    });
    resetBtn.addEventListener('click', () => {
        userImage = null;
        photoInput.value = '';
        render();
    });

    render();
    </script>
</body>
</html>

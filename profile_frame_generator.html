<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прогресивна България — профилна рамка</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🟢</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Montserrat, 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0a2e1f 0%, #1b5e3b 40%, #7cb342 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #fff;
            border-radius: 20px;
            padding: 36px;
            max-width: 820px;
            width: 100%;
            box-shadow: 0 24px 64px rgba(0,0,0,.25);
        }
        h1 { color: #1b5e3b; font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 8px; }
        .sub { text-align: center; color: #2a7a52; font-weight: 600; font-size: 15px; margin-bottom: 24px; }
        .file-label {
            display: block;
            padding: 18px;
            background: linear-gradient(135deg, #1b5e3b, #2a7a52);
            color: #fff;
            text-align: center;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid #0f3d2e;
        }
        .file-label:hover { filter: brightness(1.06); }
        #photoInput { position: absolute; opacity: 0; width: 0; height: 0; }
        .preview-wrap { margin: 28px 0; text-align: center; }
        .canvas-box {
            display: inline-block;
            border: 3px solid #1b5e3b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 28px rgba(27,94,59,.35);
        }
        #previewCanvas { display: block; max-width: 100%; height: auto; background: #e8e8e8; }
        .btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-dl { background: #1b5e3b; color: #fff; }
        .btn-dl:disabled { opacity: .45; cursor: not-allowed; }
        .btn-rst { background: #e0e0e0; color: #333; }
        .controls {
            margin: 18px 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px 16px;
        }
        @media (max-width: 720px) { .controls { grid-template-columns: 1fr 1fr; } }
        .controls label { font-size: 12px; font-weight: 600; color: #1b5e3b; display: block; margin-bottom: 6px; }
        .controls input[type="range"] { width: 100%; }
        .controls-note { grid-column: 1 / -1; font-size: 11px; color: #666; margin-top: 4px; }
        .btn-small {
            margin-top: 8px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid #1b5e3b;
            background: #fff;
            color: #1b5e3b;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-small:hover { background: #f0f7f4; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Прогресивна България</h1>
        <p class="sub">Генератор на профилна рамка — нова визия 2026</p>
        <label class="file-label">
            Изберете снимка
            <input type="file" id="photoInput" accept="image/*">
        </label>
        <div class="controls" id="controls">
            <div>
                <label>Мащаб на снимката <span id="vSize">100</span>%</label>
                <input type="range" id="sizeSlider" min="60" max="150" value="100">
            </div>
            <div>
                <label>Х позиция <span id="vPosX">0</span></label>
                <input type="range" id="posXSlider" min="-100" max="100" value="0">
            </div>
            <div>
                <label>Y позиция <span id="vPosY">0</span></label>
                <input type="range" id="posYSlider" min="-100" max="100" value="0">
            </div>
            <div>
                <label>Дебелина на лентата <span id="vThick">50</span>%</label>
                <input type="range" id="thickSlider" min="25" max="100" value="50">
            </div>
            <div>
                <label>Дебелина на контура <span id="vStroke">50</span>%</label>
                <input type="range" id="strokeSlider" min="25" max="100" value="50">
            </div>
            <div>
                <label>Размер на кръга <span id="vCircle">100</span>%</label>
                <input type="range" id="circleSlider" min="88" max="100" value="100">
            </div>
            <div>
                <label>Мащаб на банера <span id="vBanner">100</span>%</label>
                <input type="range" id="bannerSlider" min="70" max="130" value="100">
            </div>
            <p class="controls-note">Х/Y и мащаб на снимката след качване. Останалото — веднага в прегледа.</p>
            <div style="grid-column:1/-1;">
                <button type="button" class="btn-small" id="resetSettingsBtn">Нулирай настройките</button>
            </div>
        </div>
        <div class="preview-wrap">
            <div class="canvas-box">
                <canvas id="previewCanvas" width="800" height="800"></canvas>
            </div>
        </div>
        <div class="btns">
            <button class="btn btn-dl" id="downloadBtn" disabled>⬇ Изтегли снимката</button>
            <button class="btn btn-rst" id="resetBtn" disabled>🔄 Нова снимка</button>
        </div>
    </div>

    <script>
    const BANNER_URL = '/assets/pb_banner_lockup.png';
    const CANVAS_SIZE = 800;
    const PB_GREEN = '#1b5e3b';

    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const photoInput = document.getElementById('photoInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');
    const sizeSlider = document.getElementById('sizeSlider');
    const thickSlider = document.getElementById('thickSlider');
    const posXSlider = document.getElementById('posXSlider');
    const posYSlider = document.getElementById('posYSlider');
    const strokeSlider = document.getElementById('strokeSlider');
    const circleSlider = document.getElementById('circleSlider');
    const bannerSlider = document.getElementById('bannerSlider');
    const resetSettingsBtn = document.getElementById('resetSettingsBtn');
    const vSize = document.getElementById('vSize');
    const vThick = document.getElementById('vThick');
    const vPosX = document.getElementById('vPosX');
    const vPosY = document.getElementById('vPosY');
    const vStroke = document.getElementById('vStroke');
    const vCircle = document.getElementById('vCircle');
    const vBanner = document.getElementById('vBanner');

    let userImage = null;
    let brandBanner = null;
    const DEFAULT_SETTINGS = {
        size: 100, thick: 50, posX: 0, posY: 0,
        stroke: 50, circle: 100, bannerScale: 100
    };
    const settings = { ...DEFAULT_SETTINGS };

    const bannerImg = new Image();
    bannerImg.crossOrigin = 'anonymous';
    bannerImg.onload = () => { brandBanner = bannerImg; render(); };
    bannerImg.onerror = () => { brandBanner = null; render(); };
    bannerImg.src = BANNER_URL;

    function drawBannerFallback(ctx, size, bandTop) {
        const bh = size - bandTop;
        const g = ctx.createLinearGradient(0, bandTop, 0, size);
        g.addColorStop(0, '#3d9b8a');
        g.addColorStop(1, '#2a7a6e');
        ctx.fillStyle = g;
        ctx.fillRect(0, bandTop, size, bh);
        const cx = size / 2;
        const mid = bandTop + bh * 0.38;
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = '800 ' + (bh * 0.11) + 'px Montserrat, sans-serif';
        ctx.fillText('ПРОГРЕСИВНА', cx, mid);
        ctx.font = '800 ' + (bh * 0.12) + 'px Montserrat, sans-serif';
        ctx.fillText('БЪЛГАРИЯ', cx, mid + bh * 0.14);
        const box = bh * 0.42;
        const by = bandTop + bh * 0.58;
        ctx.fillStyle = '#fff';
        ctx.fillRect(cx - box / 2, by, box, box * 0.85);
        ctx.fillStyle = PB_GREEN;
        ctx.textBaseline = 'middle';
        ctx.font = '900 ' + (box * 0.55) + 'px Montserrat, sans-serif';
        ctx.fillText('21', cx, by + box * 0.42);
        ctx.textBaseline = 'alphabetic';
    }

    function getOuterRadius(size) {
        return (size / 2 - 4) * (settings.circle / 100);
    }

    function getBorderWidth(size) {
        return size * (0.006 + 0.016 * (settings.stroke / 100));
    }

    function drawFrameLayer(ctx, size, hasPhoto) {
        const center = size / 2;
        const outerR = getOuterRadius(size);
        const t = settings.thick / 100;
        const bandH = size * (0.22 + 0.16 * t);
        const bandTop = size - bandH;
        const borderW = getBorderWidth(size);

        ctx.save();
        ctx.beginPath();
        ctx.arc(center, center, outerR, 0, Math.PI * 2);
        ctx.clip();

        if (!hasPhoto) {
            ctx.fillStyle = '#dedede';
            ctx.beginPath();
            ctx.arc(center, center, outerR - borderW * 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#bbb';
            ctx.font = '600 22px Montserrat, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Качете снимка', center, center - 12);
            ctx.font = '400 15px Montserrat, sans-serif';
            ctx.fillText('или ползвайте прегледа по-долу', center, center + 18);
        }

        ctx.save();
        ctx.beginPath();
        ctx.rect(0, bandTop, size, bandH + 4);
        ctx.clip();
        ctx.fillStyle = '#3d9b8a';
        ctx.fillRect(0, bandTop, size, bandH + 4);

        if (brandBanner && brandBanner.complete && brandBanner.naturalWidth > 0) {
            const iw = brandBanner.naturalWidth;
            const ih = brandBanner.naturalHeight;
            const m = 0.025;
            const sx = iw * m, sy = ih * m, sw = iw * (1 - 2 * m), sh = ih * (1 - 2 * m);
            if (sw < 8 || sh < 8) {
                ctx.drawImage(brandBanner, 0, bandTop, size, bandH);
            } else {
                const scale = Math.min(size / sw, bandH / sh);
                let dw = sw * scale, dh = sh * scale;
                const bs = settings.bannerScale / 100;
                dw *= bs;
                dh *= bs;
                if (dw > size - 6) { const r = (size - 6) / dw; dw *= r; dh *= r; }
                if (dh > bandH - 4) { const r = (bandH - 4) / dh; dw *= r; dh *= r; }
                ctx.drawImage(brandBanner, sx, sy, sw, sh, (size - dw) / 2, bandTop + (bandH - dh) / 2, dw, dh);
            }
        } else {
            drawBannerFallback(ctx, size, bandTop);
        }
        ctx.restore();
        ctx.restore();

        ctx.save();
        ctx.beginPath();
        ctx.arc(center, center, outerR, 0, Math.PI * 2);
        ctx.strokeStyle = PB_GREEN;
        ctx.lineWidth = borderW;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.stroke();
        ctx.restore();
    }

    function render() {
        const s = CANVAS_SIZE;
        ctx.fillStyle = '#e8e8e8';
        ctx.fillRect(0, 0, s, s);
        const center = s / 2;
        const outerR = getOuterRadius(s);
        const sc = settings.size / 100;
        const borderW = getBorderWidth(s);

        if (userImage && userImage.complete) {
            ctx.save();
            const photoR = Math.max(outerR - borderW * 0.4, outerR * 0.88);
            ctx.beginPath();
            ctx.arc(center, center, photoR, 0, Math.PI * 2);
            ctx.clip();
            const iw = userImage.naturalWidth;
            const ih = userImage.naturalHeight;
            const cover = Math.max((photoR * 2) / iw, (photoR * 2) / ih);
            let w = iw * cover * sc;
            let h = ih * cover * sc;
            const px = settings.posX * s * 0.004;
            const py = settings.posY * s * 0.004;
            if (sc < 0.995) {
                ctx.fillStyle = '#2a2a2a';
                ctx.beginPath();
                ctx.arc(center, center, photoR, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.drawImage(userImage, center - w / 2 + px, center - h / 2 + py, w, h);
            ctx.restore();
        }

        drawFrameLayer(ctx, s, !!userImage);
        downloadBtn.disabled = !userImage;
        resetBtn.disabled = !userImage;
    }

    function applySettingsToUI() {
        sizeSlider.value = settings.size;
        thickSlider.value = settings.thick;
        posXSlider.value = settings.posX;
        posYSlider.value = settings.posY;
        strokeSlider.value = settings.stroke;
        circleSlider.value = settings.circle;
        bannerSlider.value = settings.bannerScale;
        vSize.textContent = settings.size;
        vThick.textContent = settings.thick;
        vPosX.textContent = settings.posX;
        vPosY.textContent = settings.posY;
        vStroke.textContent = settings.stroke;
        vCircle.textContent = settings.circle;
        vBanner.textContent = settings.bannerScale;
    }

    resetSettingsBtn.addEventListener('click', () => {
        Object.assign(settings, DEFAULT_SETTINGS);
        applySettingsToUI();
        render();
    });

    photoInput.addEventListener('change', function () {
        const f = this.files && this.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = () => {
            const img = new Image();
            img.onload = () => { userImage = img; render(); };
            img.src = r.result;
        };
        r.readAsDataURL(f);
    });

    sizeSlider.addEventListener('input', () => { settings.size = +sizeSlider.value; vSize.textContent = settings.size; render(); });
    thickSlider.addEventListener('input', () => { settings.thick = +thickSlider.value; vThick.textContent = settings.thick; render(); });
    posXSlider.addEventListener('input', () => { settings.posX = +posXSlider.value; vPosX.textContent = settings.posX; render(); });
    posYSlider.addEventListener('input', () => { settings.posY = +posYSlider.value; vPosY.textContent = settings.posY; render(); });
    strokeSlider.addEventListener('input', () => { settings.stroke = +strokeSlider.value; vStroke.textContent = settings.stroke; render(); });
    circleSlider.addEventListener('input', () => { settings.circle = +circleSlider.value; vCircle.textContent = settings.circle; render(); });
    bannerSlider.addEventListener('input', () => { settings.bannerScale = +bannerSlider.value; vBanner.textContent = settings.bannerScale; render(); });

    downloadBtn.addEventListener('click', () => {
        const a = document.createElement('a');
        a.download = 'progressive-bulgaria-profil.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
    });
    resetBtn.addEventListener('click', () => {
        userImage = null;
        photoInput.value = '';
        render();
    });

    applySettingsToUI();
    render();
    </script>
</body>
</html>
